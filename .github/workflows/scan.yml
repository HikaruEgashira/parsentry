name: Security Scan

on:
  workflow_call:
    inputs:
      version:
        description: 'Parsentry version to use (e.g., v0.15.0). Defaults to latest.'
        required: false
        type: string
        default: 'latest'
      model:
        description: 'Analysis model to use'
        required: false
        type: string
        default: 'gpt-5.1-codex'
    secrets:
      PARSENTRY_API_KEY:
        description: 'API key for the analysis model provider'
        required: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        timeout-minutes: 5
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install parsentry
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          PARSENTRY_VERSION: ${{ inputs.version }}
        run: |
          if [ "${PARSENTRY_VERSION}" = "latest" ]; then
            TAG=$(gh release list --repo HikaruEgashira/parsentry --limit 1 --json tagName --jq '.[0].tagName')
          else
            TAG="${PARSENTRY_VERSION}"
          fi
          echo "Installing parsentry ${TAG}"
          gh release download "${TAG}" \
            --repo HikaruEgashira/parsentry \
            --pattern 'parsentry-x86_64-unknown-linux-gnu.tar.gz' \
            --dir /tmp
          tar xzf /tmp/parsentry-x86_64-unknown-linux-gnu.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/parsentry
          parsentry --version

      - name: Cache parsentry scan results
        timeout-minutes: 5
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .parsentry/cache
          key: parsentry-cache-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            parsentry-cache-${{ github.base_ref }}-
            parsentry-cache-

      - name: Get changed source files
        id: diff
        timeout-minutes: 2
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(py|js|ts|jsx|tsx|go|java|rb|rs|c|cpp|cs|php|swift|kt|scala|tf|hcl|yml|yaml|sh|sql|pl|pm|lua)$' \
            | head -200)
          if [ -z "$FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "count=$(echo "$FILES" | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Run scan
        if: steps.diff.outputs.skip != 'true'
        timeout-minutes: 20
        run: |
          parsentry . \
            --diff-base origin/${{ github.base_ref }} \
            --output-dir reports \
            --cache
        env:
          PARSENTRY_ANALYSIS_MODEL: ${{ inputs.model }}

      - name: Upload reports
        if: steps.diff.outputs.skip != 'true'
        timeout-minutes: 5
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-scan-reports
          path: reports/
          if-no-files-found: ignore
