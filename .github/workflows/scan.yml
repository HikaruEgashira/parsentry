name: Security Scan

on:
  workflow_call:
    inputs:
      version:
        description: 'Parsentry version to use (e.g., v0.15.0). Defaults to latest.'
        required: false
        type: string
        default: 'latest'
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude analysis'
        required: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        timeout-minutes: 5
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install parsentry
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          PARSENTRY_VERSION: ${{ inputs.version }}
        run: |
          if [ "${PARSENTRY_VERSION}" = "latest" ]; then
            TAG=$(gh release list --repo HikaruEgashira/parsentry --limit 1 --json tagName --jq '.[0].tagName')
          else
            TAG="${PARSENTRY_VERSION}"
          fi
          echo "Installing parsentry ${TAG}"
          gh release download "${TAG}" \
            --repo HikaruEgashira/parsentry \
            --pattern 'parsentry-x86_64-unknown-linux-gnu.tar.gz' \
            --dir /tmp
          tar xzf /tmp/parsentry-x86_64-unknown-linux-gnu.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/parsentry
          parsentry --version

      - name: Cache parsentry scan results
        timeout-minutes: 5
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .parsentry/cache
          key: parsentry-cache-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            parsentry-cache-${{ github.base_ref }}-
            parsentry-cache-

      - name: Get changed source files
        id: diff
        timeout-minutes: 2
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" \
            | grep -E '\.(py|js|ts|jsx|tsx|go|java|rb|rs|c|cpp|cs|php|swift|kt|scala|tf|hcl|yml|yaml|sh|sql|pl|pm|lua)$' \
            | head -200)
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "count=$(echo "$FILES" | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scan
        if: steps.diff.outputs.skip != 'true'
        timeout-minutes: 20
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          parsentry scan . \
            --diff-base "origin/${BASE_REF}"

      - name: Upload reports
        if: steps.diff.outputs.skip != 'true'
        timeout-minutes: 5
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-scan-reports
          path: reports/
          if-no-files-found: ignore
