name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.15.0)'
        required: true
        type: string
permissions: {}
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - name: Checkout
        timeout-minutes: 5
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - name: Install Rust
        timeout-minutes: 5
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Cache cargo registry
        timeout-minutes: 5
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        timeout-minutes: 5
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        timeout-minutes: 5
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        timeout-minutes: 20
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        timeout-minutes: 2
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../parsentry-${{ matrix.target }}.tar.gz parsentry
          cd -
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        timeout-minutes: 2
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path parsentry.exe -DestinationPath ../../../parsentry-${{ matrix.target }}.zip
          cd -
      - name: Upload artifact
        timeout-minutes: 5
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parsentry-${{ matrix.target }}
          path: parsentry-${{ matrix.target }}.${{ matrix.archive }}
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        timeout-minutes: 5
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - name: Install Rust
        timeout-minutes: 5
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1
        id: auth
        timeout-minutes: 5
      - name: Publish crates
        timeout-minutes: 10
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          publish() { cargo publish -p "$1" || echo "::warning::$1 publish skipped (already exists?)"; }
          publish parsentry-core
          sleep 10
          publish parsentry-cache
          publish parsentry-claude
          publish parsentry-parser
          publish parsentry-reports
          sleep 10
          publish parsentry
  release:
    name: Create Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        timeout-minutes: 5
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - name: Download all artifacts
        timeout-minutes: 5
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/artifacts
      - name: Create Release
        timeout-minutes: 5
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ runner.temp }}/artifacts/*/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
