name: Mutation Testing

on:
  push:
    branches: [main]
    paths:
      - "crates/*/src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "crates/*/src/**"
  workflow_dispatch:

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        crate:
          - parsentry-core
          - parsentry-utils
          - parsentry-cache
          - parsentry-reports
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android
          sudo docker image prune --all --force || true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-mutants-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-${{ matrix.crate }}-
            ${{ runner.os }}-mutants-

      - name: Install cargo-mutants
        run: which cargo-mutants || cargo install cargo-mutants --locked

      - name: Run mutation testing on ${{ matrix.crate }}
        run: cargo mutants -p ${{ matrix.crate }} --timeout 60 --output mutants.out --config mutants.toml -- --lib

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-report-${{ matrix.crate }}
          path: mutants.out/
