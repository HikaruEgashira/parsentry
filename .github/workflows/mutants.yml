name: Mutation Testing
on:
  push:
    branches: [main]
    paths:
      - "crates/*/src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "crates/*/src/**"
  workflow_dispatch:
concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        crate:
          - parsentry-core
          - parsentry-utils
          - parsentry-cache
          - parsentry-reports
    steps:
      - name: Free disk space
        timeout-minutes: 5
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android
          sudo docker image prune --all --force || true
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          submodules: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        timeout-minutes: 5
        with:
          toolchain: stable
      - if: github.event_name != 'push'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        timeout-minutes: 5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-mutants-${{ matrix.crate }}-${{ github.sha }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-${{ matrix.crate }}-
            ${{ runner.os }}-mutants-
      - name: Install cargo-mutants
        timeout-minutes: 5
        run: which cargo-mutants || cargo install cargo-mutants --locked
      - name: Run mutation testing on ${{ matrix.crate }}
        timeout-minutes: 5
        run: cargo mutants -p ${{ matrix.crate }} --timeout 60 --output mutants.out --in-place --config mutants.toml -- --lib
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: 5
        with:
          name: mutation-report-${{ matrix.crate }}
          path: mutants.out/
      - name: Save cache
        if: github.event_name == 'push'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        timeout-minutes: 5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-mutants-${{ matrix.crate }}-${{ github.sha }}-${{ hashFiles('**/Cargo.lock') }}
